name: build

# manual only: run from the Actions tab to build and grab the .asi artifact.
# release packaging lives in release.yml
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build (Release | Win32)
        run: msbuild build/customskin.vcxproj /p:Configuration=Release /p:Platform=Win32 /m

      - name: Upload customskin.asi
        uses: actions/upload-artifact@v4
        with:
          name: customskin-asi
          path: build/bin/Release/customskin.asi
          if-no-files-found: error
